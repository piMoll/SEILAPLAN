
# Dependencies
# -----------------------------------

optional-dependencies.dev =[
    "pre-commit",
    "flake8",
    "flake8-pyproject",
    "flake8-qgis",
    "bandit",
    "detect-secrets",
    "black",
    "isort",
    "qgis-plugin-ci",
]


# Packaging
# -----------------------------------

[tool.qgis-plugin-ci]
plugin_path = "SEILAPLAN"
project_slug = "SEILAPLAN"
github_organization_slug = "piMoll"


# Code Quality
# -----------------------------------

[tool.black]
line-length = 88
target-version = ["py311", "py312"]
include = '\.pyi?$'
force-exclude = '''
/(
  | \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
  | lib
  | config
  | SEILAPLAN/lib
)/
'''
# Use single quotes for string normalization
skip-string-normalization = false

[tool.flake8]
# Ignore conflicts with Black (autoformatter)
# C901 = Method too complex
extend-ignore = ["E203", "E266", "E501", "W503", "W504", "F403", "F401", "C901", "QGS201", "QGS202", "QGS105"]
max-line-length = 88
# Exclude typical hidden or generated directories
exclude = [".git","__pycache__","dist","build",".venv","venv","env","migrations","lib","SEILAPLAN/lib"]
# Enforce complexity threshold (optional but recommended)
max-complexity = 15

# 5. Show source code and statistics
show-source = true
statistics = true
count = true


[tool.isort]
atomic = true
profile = "black"
line_length = 88
skip_gitignore = true
extend_skip = ["lib", "SEILAPLAN/lib"]
known_first_party = ["SEILAPLAN"]
force_sort_within_sections = true
include_trailing_comma = true
